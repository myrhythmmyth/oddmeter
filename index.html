<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>変拍子データベース</title>
  <meta name="description" content="あらゆる変拍子楽曲を集めたデータベース。検索・フィルタ・統計でお気に入りの一曲を探そう。" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />

  <!-- favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />

  <!-- OGP / Twitter（リンク共有時のサムネ） -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="変拍子データベース" />
  <meta property="og:description" content="あらゆる変拍子楽曲を集めたデータベース。検索・フィルタ・統計で探せる。" />
  <meta property="og:url" content="https://myrhythmmyth.github.io/oddmeter/" />
  <meta property="og:image" content="https://myrhythmmyth.github.io/oddmeter/og-image.png?v=1" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="変拍子データベース" />
  <meta name="twitter:description" content="あらゆる変拍子楽曲を集めたデータベース。" />
  <meta name="twitter:image" content="https://myrhythmmyth.github.io/oddmeter/og-image.png?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=16" />
</head>
<body>
  <!-- 背景の動くオーブ -->
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- ヘッダー -->
  <header class="site-header glass">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="brand-text">
        <h1>変拍子楽曲データベース</h1>
      </div>
    </div>
    <div class="header-actions">
      <a class="cta-btn" href="https://docs.google.com/forms/d/e/1FAIpQLScRizrFjpaTIP92VatCkkycaeB-4MN_sHOR1ySGS36naOHMUA/viewform?usp=header"
         target="_blank" rel="noopener" title="変拍子楽曲を教えてください">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
        <span class="cta-label">楽曲を教えて</span>
      </a>
      <button id="viewToggle" class="icon-btn glass" title="表示切替（グリッド / リスト）" aria-label="表示切替">
        <svg class="i-list" viewBox="0 0 24 24" width="20" height="20"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        <svg class="i-grid" viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button id="themeToggle" class="icon-btn glass" title="ライト / ダーク切替" aria-label="テーマ切替">
        <svg class="i-moon" viewBox="0 0 24 24" width="20" height="20"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="i-sun" viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/></svg>
      </button>
    </div>
  </header>

  <main>
    <!-- 統計ダッシュボード -->
    <section class="hero">
      <div class="stats-dash" id="statsDash">
        <div class="stats-col">
          <div class="stat-card glass stat-row">
            <span class="stat-label">登録曲数</span>
            <span class="stat-num" id="statTotal">—</span>
          </div>
          <div class="stat-card glass stat-row">
            <span class="stat-label">アーティスト</span>
            <span class="stat-num" id="statArtists">—</span>
          </div>
          <div class="stat-card glass stat-row">
            <span class="stat-label">拍子バリエーション</span>
            <span class="stat-num" id="statMeters">—</span>
          </div>
        </div>
        <div class="stat-card glass wide">
          <div class="mini-chart-head">
            <span>拍子の分布</span>
            <span class="mini-chart-hint" id="topMeterHint"></span>
          </div>
          <div class="bars" id="meterBars"></div>
        </div>
      </div>
    </section>

    <!-- 2カラムレイアウト: サイドバー + 本体 -->
    <div class="layout">
      <!-- アーティスト一覧サイドバー -->
      <aside class="sidebar glass" id="sidebar">
        <!-- モバイルではこのボタンがトグル兼タイトル。押すと下にアーティスト一覧が展開 -->
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-expanded="false" aria-controls="sidebarInner">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          <span>アーティストで探す</span>
        </button>
        <div class="sidebar-inner" id="sidebarInner">
          <div class="sidebar-head">
            <span class="sidebar-title">アーティスト</span>
            <span class="sidebar-count"><span id="artistTotal">—</span> 組</span>
          </div>
          <div class="artist-search-wrap">
            <input id="artistSearch" type="search" placeholder="アーティストを絞り込み…" autocomplete="off" />
          </div>
          <div class="artist-sort" id="artistSort">
            <button class="asort-btn active" data-sort="count">曲数順</button>
            <button class="asort-btn" data-sort="name">名前順</button>
          </div>
          <div class="artist-list" id="artistList"></div>
        </div>
      </aside>

      <div class="content">
    <!-- コントロールバー -->
    <section class="controls glass" id="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="searchInput" type="search" placeholder="曲名・アーティスト・備考で検索…" autocomplete="off" />
      </div>
      <div class="control-group">
        <div class="select-wrap">
          <label for="sortSelect">並び替え</label>
          <select id="sortSelect">
            <option value="title">曲名 A→Z</option>
            <option value="artist">アーティスト A→Z</option>
            <option value="difficulty-asc">難易度 低→高</option>
            <option value="difficulty-desc">難易度 高→低</option>
          </select>
        </div>
      </div>
    </section>

    <!-- フィルタチップ -->
    <section class="filters">
      <div class="filter-row">
        <button class="filter-label" type="button" data-filter-toggle aria-expanded="false">
          拍子<svg class="flt-caret" viewBox="0 0 24 24" width="14" height="14"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="meter-mode" id="meterMode" title="複数選択時の条件">
          <button class="mode-btn active" data-mode="or">いずれか</button>
          <button class="mode-btn" data-mode="and">すべて含む</button>
        </div>
        <div class="chips" id="meterChips"></div>
      </div>
      <div class="filter-row">
        <button class="filter-label" type="button" data-filter-toggle aria-expanded="false">
          難易度<svg class="flt-caret" viewBox="0 0 24 24" width="14" height="14"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="chips" id="difficultyChips"></div>
      </div>
    </section>

    <!-- 結果カウント -->
    <div class="result-bar">
      <span id="resultCount" class="result-count"></span>
      <button id="clearFilters" class="clear-btn" hidden>
        <svg viewBox="0 0 24 24" width="14" height="14"><path d="M6 6l12 12M18 6L6 18"/></svg>
        条件をすべてクリア
      </button>
    </div>

    <!-- カードグリッド -->
    <section class="grid" id="cardGrid" aria-live="polite"></section>

    <!-- 空状態 -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-emoji">🎼</div>
      <p>条件に合う曲が見つかりませんでした。</p>
      <button class="ghost-btn" onclick="OddMeter.clearAll()">条件をリセット</button>
    </div>
      </div><!-- /.content -->
    </div><!-- /.layout -->
  </main>

  <footer class="site-footer">
    <div class="credits">
      <span class="credits-label">Credits</span>
      <a class="credit-item" href="https://x.com/myrhythmmyth" target="_blank" rel="noopener">
        <svg class="x-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        fuzzfullness / buzzoffall<span class="credit-handle">@myrhythmmyth</span>
      </a>
      <a class="credit-item" href="https://x.com/wase_mathrock" target="_blank" rel="noopener">
        <svg class="x-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        変拍子bot<span class="credit-handle">@wase_mathrock</span>
      </a>
    </div>
  </footer>

  <!-- 詳細モーダル -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal glass" role="dialog" aria-modal="true">
      <button class="modal-close icon-btn" id="modalClose" aria-label="閉じる">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/config.js?v=16"></script>
  <script src="js/app.js?v=16"></script>
</body>
</html>
